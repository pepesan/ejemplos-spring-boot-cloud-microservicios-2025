server:
  # Puerto dedicado del servicio de productos.
  # Convenio del proyecto: servicios de dominio en el rango 8083-8089.
  port: 8083

spring:
  r2dbc:
    # URL de H2 en memoria con modo compatible R2DBC.
    # CASE_INSENSITIVE_IDENTIFIERS=TRUE evita que H2 almacene los identificadores en mayúsculas,
    # lo que haría que las consultas generadas por Spring Data R2DBC (minúsculas) fallen.
    # La base de datos desaparece al detener el proceso (útil para ejemplos y tests).
    # Para persistencia real, cambiar a PostgreSQL o MySQL con el driver R2DBC correspondiente.
    url: r2dbc:h2:mem:///productosdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password: ""

  cloud:
    stream:
      # Enlaza el bean funcional 'procesarPedido' (Consumer<PedidoCreado>) con Kafka.
      # Spring Cloud Stream infiere el binding 'procesarPedido-in-0' del nombre del bean.
      bindings:
        procesarPedido-in-0:
          # Topic Kafka del que se consumen los eventos PedidoCreado.
          # Debe coincidir con el topic al que publica servicio-pedidos.
          destination: pedidos-creados
          # Grupo de consumidores: todos los pods de este servicio comparten el grupo,
          # garantizando que cada mensaje se procesa una sola vez (semántica at-least-once).
          group: servicio-productos-group
      kafka:
        binder:
          # Dirección del broker Kafka arrancado con docker/compose.yaml.
          brokers: localhost:9092

  # Declara explícitamente los beans funcionales que actúan como consumidores/productores.
  # Sin esto, Spring Cloud Stream no registra el Consumer<PedidoCreado> como listener.
  function:
    definition: procesarPedido

eureka:
  client:
    service-url:
      # URL del servidor Eureka donde se registra este servicio.
      defaultZone: http://localhost:8761/eureka/
  instance:
    # Prefiere la dirección IP en lugar del hostname para evitar problemas de resolución DNS
    # en entornos Docker o donde el hostname no es accesible desde otros contenedores.
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        # Expone los endpoints de Actuator necesarios para monitorización y diagnóstico.
        include: health,info,metrics,env
  endpoint:
    health:
      # Incluye detalles de salud (DB, Kafka, Eureka) para facilitar el diagnóstico.
      show-details: always
