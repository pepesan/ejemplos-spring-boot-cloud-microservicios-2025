# Configuración compartida por TODOS los servicios del ecosistema.
# Cualquier propiedad aquí definida aplica a todos salvo que el fichero
# específico del servicio la sobreescriba.

# --- Actuator (común a todos) ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,tracing
  endpoint:
    health:
      show-details: always

  # --- Tracing distribuido (Micrometer Tracing + Zipkin) ---
  tracing:
    sampling:
      # 100% de trazas en desarrollo; bajar a 0.1 en producción
      probability: 1.0
    export:
      zipkin:
        endpoint: http://localhost:9411/api/v2/spans
