databaseChangeLog:
  - changeSet:
      id: 1-create-producto
      author: consul-productos
      changes:
        - createTable:
            tableName: producto
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nombre
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: descripcion
                  type: VARCHAR(1000)
              - column:
                  name: precio
                  type: DECIMAL(10, 2)
                  constraints:
                    nullable: false
              - column:
                  name: stock
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

  - changeSet:
      id: 2-insert-productos-iniciales
      author: consul-productos
      changes:
        - insert:
            tableName: producto
            columns:
              - column:
                  name: nombre
                  value: "Teclado mecánico"
              - column:
                  name: descripcion
                  value: "Teclado TKL con switches Cherry MX Red"
              - column:
                  name: precio
                  valueNumeric: 89.99
              - column:
                  name: stock
                  valueNumeric: 50
