server:
  port: 9090

spring:
  application:
    name: admin-server

  # Credenciales para acceder al panel web
  security:
    user:
      name: admin
      password: admin

  boot:
    admin:
      # Credenciales que los clientes deben enviar al registrarse
      client:
        username: ${spring.security.user.name}
        password: ${spring.security.user.password}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
