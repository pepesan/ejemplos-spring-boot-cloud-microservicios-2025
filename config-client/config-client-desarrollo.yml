# Configuración específica del perfil 'desarrollo'.
# Sobreescribe las propiedades de config-client.yml para este entorno.
#
# Se activa con: --spring.profiles.active=desarrollo

app:
  entorno: "desarrollo"
  mensaje: "Estás en el perfil de DESARROLLO — logs detallados, límite bajo"
  limite-peticiones: 10

# En desarrollo se activa el nivel DEBUG para ver todas las trazas del servicio.
logging:
  level:
    com.cursosdedesarrollo: DEBUG
    org.springframework.cloud.config: DEBUG
