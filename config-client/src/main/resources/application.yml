spring:
  application:
    # Nombre con el que este servicio se identifica ante el Config Server.
    # El servidor buscará en config-repo los ficheros:
    #   1. config-client-<perfil>.yml  (específico del perfil)
    #   2. config-client.yml           (base del servicio)
    #   3. application.yml             (compartido por todos los servicios)
    name: config-client

  config:
    # Importa la configuración desde el Config Server al arrancar.
    # 'optional:' permite que el servicio arranque aunque el servidor no esté disponible.
    # Eliminar 'optional:' en producción para que un Config Server caído impida el arranque.
    import: "optional:configserver:http://localhost:8888"

# El puerto y las propiedades 'app.*' se reciben del Config Server.
# Este fichero solo contiene lo mínimo necesario para conectar con él.

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: always
